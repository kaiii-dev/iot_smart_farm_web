<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <script>
      // Decode SPA redirect from 404.html
      (function() {
        var p = window.location.search.match(/[?&]p=([^&]*)/);
        if (p) {
          window.history.replaceState(null, null,
            window.location.pathname.split('/').slice(0, 2).join('/') +
            '/' + decodeURIComponent(p[1]).replace(/~and~/g, '&') +
            (window.location.search.match(/[?&]q=([^&]*)/) ? '?' + decodeURIComponent(window.location.search.match(/[?&]q=([^&]*)/)[1]).replace(/~and~/g, '&') : '') +
            window.location.hash
          );
        }
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <title>AgroSense — Dashboard</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
